name: Deploy to AWS (S3 + CloudFront)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ── v1: pre-built Vite bundle ────────────────────────────────────
      - name: Sync v1 assets to S3 (long cache, content-hashed)
        run: |
          aws s3 sync v1/assets/ s3://${{ secrets.S3_BUCKET_NAME }}/v1/assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload v1 index.html (no cache)
        run: |
          aws s3 cp v1/index.html s3://${{ secrets.S3_BUCKET_NAME }}/v1/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      # ── v2: static files, Babel CDN, no build step ───────────────────
      - name: Upload v2 index.html (no cache)
        run: |
          aws s3 cp v2/index.html s3://${{ secrets.S3_BUCKET_NAME }}/v2/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Sync v2 JS files to S3 (short cache, versioned via ?v= param)
        run: |
          for f in v2/app.jsx v2/data.js v2/engine.js v2/ui.jsx; do
            aws s3 cp $f s3://${{ secrets.S3_BUCKET_NAME }}/$f \
              --cache-control "public, max-age=300"
          done

      # ── Invalidate CloudFront ─────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/v2/*"

      - name: Print URLs
        run: |
          DOMAIN=$(aws cloudfront get-distribution \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)
          echo ""
          echo "=========================================="
          echo "  v1: https://$DOMAIN/v1/"
          echo "  v2: https://$DOMAIN/v2/"
          echo "=========================================="

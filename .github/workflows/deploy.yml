name: Deploy to AWS (S3 + CloudFront)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ── v1: pre-built Vite bundle ────────────────────────────────────
      - name: Sync v1 assets to S3 (long cache, content-hashed)
        run: |
          aws s3 sync climate-games/v1/assets/ s3://${{ secrets.S3_BUCKET_NAME }}/climate-games/v1/assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload v1 index.html (no cache)
        run: |
          aws s3 cp climate-games/v1/index.html s3://${{ secrets.S3_BUCKET_NAME }}/climate-games/v1/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      # ── v2: static files, Babel CDN, no build step ───────────────────
      - name: Upload v2 index.html (no cache)
        run: |
          aws s3 cp climate-games/v2/index.html s3://${{ secrets.S3_BUCKET_NAME }}/climate-games/v2/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Sync v2 JS files to S3 (short cache, versioned via ?v= param)
        run: |
          for f in climate-games/v2/app.jsx climate-games/v2/data.js climate-games/v2/engine.js climate-games/v2/ui.jsx; do
            aws s3 cp $f s3://${{ secrets.S3_BUCKET_NAME }}/$f \
              --cache-control "public, max-age=300"
          done

      # ── Invalidate CloudFront ─────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/climate-games/v1/*" "/climate-games/v2/*"

      - name: Print URLs
        run: |
          echo ""
          echo "=========================================="
          echo "  v1: https://milindk.com/climate-games/v1/"
          echo "  v2: https://milindk.com/climate-games/v2/"
          echo "=========================================="
